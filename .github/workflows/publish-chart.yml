name: publish-chart

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Helm registry login (ghcr.io)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" \
            | helm registry login ghcr.io \
                --username "${{ github.actor }}" \
                --password-stdin

      - name: Helm dependency update
        run: helm dependency update .

      - name: Helm lint
        run: helm lint .

      - name: Helm package
        id: package
        run: |
          mkdir -p dist
          helm package . --destination dist
          pkg=$(ls dist/*.tgz | head -1)
          echo "pkg=${pkg}" >> "$GITHUB_OUTPUT"

      - name: Helm push to oci://ghcr.io/ai-blaise/charts
        run: |
          helm push "${{ steps.package.outputs.pkg }}" \
            oci://ghcr.io/ai-blaise/charts

      - name: Ensure GHCR package is public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # The packages REST API requires owner-typed paths.
          # We attempt org first (ai-blaise), then user fallback.
          set +e
          gh api -X PATCH /orgs/ai-blaise/packages/container/charts%2Fbackstage             -f visibility=public 2>&1 | tail -5
          status=$?
          echo "visibility patch exit=$status"
